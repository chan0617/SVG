<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>이미지 → SVG 벡터화 변환기</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>🖼️ → 📐 이미지 SVG 벡터화 변환기</h1>
      <p class="subtitle">전처리 → 영역 분할 → 선 검출 → 벡터화 → 곡선 보정 → 조각 정리, 다단계 파이프라인으로 고품질 SVG를 생성합니다. 모든 처리는 브라우저 안에서만 이루어집니다.</p>
    </header>

    <main>
      <section id="drop-zone" class="drop-zone">
        <div class="drop-zone-content">
          <div class="drop-icon">📤</div>
          <p><strong>여기로 이미지를 드래그 앤 드롭</strong>하거나</p>
          <button id="select-btn" type="button" class="btn btn-primary">이미지 선택</button>
          <input
            id="file-input"
            type="file"
            accept=".png,.jpg,.jpeg,.webp,image/png,image/jpeg,image/webp"
            multiple
            hidden
          />
          <p class="hint">지원 형식: PNG, JPG, JPEG, WEBP (여러 장 동시 업로드 가능)</p>
        </div>
      </section>

      <section class="settings-panel">
        <div class="preset-row">
          <button class="preset-btn" data-preset="icon">
            <strong>A. 로고 / 아이콘</strong>
            <span>적은 색상 · 선명한 외곽선 · 적은 path</span>
          </button>
          <button class="preset-btn active" data-preset="illustration">
            <strong>B. 캐릭터 / 일러스트</strong>
            <span>곡선·내부 선 보존 · 봉제선·세부선 유지</span>
          </button>
          <button class="preset-btn" data-preset="product">
            <strong>C. 제품 이미지</strong>
            <span>명암 면 보존 · 높은 색상 수 · 디테일 우선</span>
          </button>
        </div>

        <details class="advanced-settings" open>
          <summary>세부 설정</summary>
          <div class="settings-grid">
            <label class="setting-item">
              <span>색상 수 <output id="color-count-value">14</output></span>
              <input type="range" id="color-count" min="4" max="32" step="1" value="14" />
            </label>
            <label class="setting-item">
              <span>Path Smoothing <output id="smoothing-value">48</output></span>
              <input type="range" id="smoothing" min="0" max="100" step="1" value="48" />
            </label>
            <label class="setting-item checkbox">
              <input type="checkbox" id="keep-shading" checked />
              <span>내부 명암 면 유지</span>
            </label>
            <label class="setting-item checkbox">
              <input type="checkbox" id="detect-lines" checked />
              <span>얇은 선(끈·봉제선) 검출</span>
            </label>
            <label class="setting-item checkbox">
              <input type="checkbox" id="remove-shadow" />
              <span>바닥 그림자 제거</span>
            </label>
            <label class="setting-item checkbox">
              <input type="checkbox" id="use-css-classes" checked />
              <span>동일 색상 CSS class로 정리</span>
            </label>
          </div>
        </details>
      </section>

      <section id="file-list-section" class="file-list-section hidden">
        <div class="section-header">
          <h2>업로드한 파일</h2>
          <button id="zip-download-btn" class="btn btn-secondary" disabled>
            📦 전체 ZIP 다운로드
          </button>
        </div>
        <ul id="file-list" class="file-list"></ul>
      </section>

      <section id="preview-section" class="preview-section hidden">
        <h2>SVG 미리보기</h2>
        <div id="preview-grid" class="preview-grid"></div>
      </section>
    </main>

    <footer class="app-footer">
      <p>모든 변환은 사용자의 브라우저 안에서만 이루어지며, 이미지가 외부 서버로 업로드되지 않습니다.</p>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
